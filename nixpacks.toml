# Nixpacks build configuration for Railway
# ============================================================================
# Adds a Node.js frontend build step to Railway's default Python provider.
# Without this file, Railway auto-detects Python only and skips the frontend
# entirely — the server then serves JSON at / instead of the React app.
#
# Strategy: keep Railway's default Python handling (pip install -r
# requirements.txt, uvicorn start command from Procfile) and inject a Node
# phase that builds frontend/dist/. FastAPI's main.py auto-mounts that dir
# at / if it exists.
# ============================================================================

[phases.setup]
# "..." preserves default auto-detected packages (Python); appends Node
nixPkgs = ["...", "nodejs_20"]

[phases.frontend]
# Runs after Python install, before the start command
dependsOn = ["install"]
cmds = [
  "cd frontend && npm ci --no-audit --no-fund && npm run build",
]
